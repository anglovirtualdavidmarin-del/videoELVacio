<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VACÍO</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
      background:black;
      overflow:hidden;
      font-family: Helvetica, Arial, sans-serif;
    }

    .container{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
    }

    /* CONTENEDOR DEL TITULO */

    .header{
      width:100%;
      background:black;
      color:white;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:24px 20px;
      z-index:10;
    }

    .title{
      font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight:900;
      font-size:clamp(2.5rem, 9vw, 7rem);
      letter-spacing:0.18em;
      text-transform:uppercase;
      line-height:1;
      text-align:center;
    }

    .author{
      margin-top:10px;
      font-size:0.8rem;
      letter-spacing:0.3em;
      text-transform:uppercase;
      opacity:0.75;
    }

    /* VIDEO */

    .video-container{
      flex:1;
      position:relative;
      width:100%;
      overflow:hidden;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    /* BOTON FULLSCREEN */

    .fullscreen-btn{
      position:absolute;
      bottom:20px;
      right:20px;
      z-index:20;
      background:rgba(0,0,0,0.7);
      border:1px solid rgba(255,255,255,0.2);
      color:white;
      padding:12px 18px;
      border-radius:999px;
      cursor:pointer;
      font-size:0.85rem;
      font-family:Helvetica, Arial, sans-serif;
      backdrop-filter:blur(10px);
    }

    .fullscreen-btn:hover{
      background:rgba(0,0,0,0.9);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- TITULO -->
    <div class="header">
      <h1 class="title">VACÍO</h1>
      <p class="author">por David Marin</p>
    </div>

    <!-- VIDEO -->
    <div class="video-container">

      <video autoplay muted loop playsinline controls>
        <source src="video.mp4" type="video/mp4">
      </video>

      <button class="fullscreen-btn" onclick="toggleFullscreen()">
        Pantalla completa
      </button>

    </div>

  </div>

  <script>
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  </script>

</body>
</html>
