<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VACÍO</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:black;
      font-family: Helvetica, Arial, sans-serif;
    }

    .container{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    video{
      position:absolute;
      top:50%;
      left:50%;
      width:100%;
      height:100%;
      object-fit:cover;
      transform:translate(-50%, -50%);
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding-top:40px;
      z-index:2;
      pointer-events:none;
    }

    .title{
      font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight:900;
      font-size:clamp(3rem, 13vw, 8rem);
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:white;
      text-align:center;
      line-height:1;
    }

    .author{
      margin-top:12px;
      font-size:0.8rem;
      letter-spacing:0.35em;
      text-transform:uppercase;
      color:white;
      opacity:0.75;
    }

    .fullscreen-btn{
      position:absolute;
      bottom:20px;
      right:20px;
      z-index:5;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.25);
      color:white;
      padding:12px 18px;
      border-radius:999px;
      cursor:pointer;
      backdrop-filter:blur(10px);
      font-size:0.85rem;
      font-family:Helvetica, Arial, sans-serif;
    }

    .fullscreen-btn:hover{
      background:rgba(255,255,255,0.2);
    }

    @media (max-width: 768px){
      .overlay{
        padding-top:28px;
      }

      .author{
        font-size:0.7rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <video id="video" autoplay muted loop playsinline controls>
      <source src="video.mp4" type="video/mp4">
    </video>

    <div class="header">
      <h1 class="title">VACÍO</h1>
      <p class="author">por David Marin</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">
      Pantalla completa
    </button>

  </div>

  <script>
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  </script>

</body>
</html>
